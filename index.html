
<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Næsby BK — Load Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0d0f12;--bg2:#141720;--bg3:#1c2030;--bg4:#232840;--text:#f0f2f7;--text2:#8b90a7;--text3:#4a4f6a;--border:#1e2238;--border2:#262c48;--blue:#4f7cff;--blue2:#3a5fd4;--blue-dim:rgba(79,124,255,.12);--green:#34d17a;--green-dim:rgba(52,209,122,.12);--amber:#f5a623;--amber-dim:rgba(245,166,35,.12);--red:#f54f4f;--red-dim:rgba(245,79,79,.12);--radius:12px;--radius-sm:8px;--radius-xs:5px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
.hidden{display:none!important}
.container{max-width:960px;margin:0 auto;padding:2rem 1.25rem}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:10px}
.brand-name{font-size:13px;font-weight:600;color:var(--text)}
.brand-sub{font-size:11px;color:var(--text3);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.875rem 1rem}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:6px}
.stat-value{font-size:24px;font-weight:700;line-height:1;color:var(--text)}
.stat-unit{font-size:12px;color:var(--text3);font-weight:400;margin-left:3px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
@media(max-width:640px){.g4{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}.i3{grid-template-columns:1fr 1fr!important}.srow,.shdr{grid-template-columns:70px 70px 50px 50px 50px 28px!important;font-size:11px}}
.slabel{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:.875rem}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600;font-family:var(--mono)}
.b-green{background:var(--green-dim);color:var(--green)}
.b-amber{background:var(--amber-dim);color:var(--amber)}
.b-red{background:var(--red-dim);color:var(--red)}
.b-blue{background:var(--blue-dim);color:var(--blue)}
.b-gray{background:var(--bg3);color:var(--text3)}
input,select{padding:8px 11px;font-size:13px;font-family:var(--font);border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3);color:var(--text);width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--blue)}
input::placeholder{color:var(--text3)}
select option{background:var(--bg2)}
.ilabel{font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.igroup{margin-bottom:12px}
.i2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.i3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.btn{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:13px;font-family:var(--font);cursor:pointer;font-weight:500;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg4);border-color:var(--border2)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:var(--blue2);border-color:var(--blue2)}
.btn-danger{color:var(--red);border-color:transparent;background:transparent}
.btn-danger:hover{background:var(--red-dim)}
.btn-sm{padding:4px 10px;font-size:12px}
.prow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);transition:all .12s}
.prow:last-child{border-bottom:none}
.prow:hover{background:var(--bg3);margin:0 -1.25rem;padding:12px 1.25rem;border-radius:var(--radius-sm)}
.prow-click{cursor:pointer}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:var(--mono)}
.shdr{display:grid;grid-template-columns:90px 90px 65px 85px 70px 32px;gap:6px;padding:0 0 8px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);margin-bottom:4px;font-weight:700}
.srow{display:grid;grid-template-columns:90px 90px 65px 85px 70px 32px;gap:6px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.srow:last-child{border-bottom:none}
.gauge-wrap{position:relative;height:10px;border-radius:5px;margin:.5rem 0;border:1px solid var(--border);overflow:hidden;background:linear-gradient(to right,rgba(79,124,255,.3) 0%,rgba(52,209,122,.3) 22%,rgba(52,209,122,.3) 50%,rgba(245,166,35,.3) 65%,rgba(245,79,79,.3) 80%,rgba(245,79,79,.3) 100%)}
.gauge-needle{position:absolute;top:-5px;width:3px;height:20px;background:var(--text);border-radius:2px;transform:translateX(-50%);transition:left .6s cubic-bezier(.34,1.56,.64,1)}
.upload-zone{border:2px dashed var(--border2);border-radius:var(--radius);padding:2.5rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg3);position:relative}
.upload-zone:hover,.upload-zone.drag{border-color:var(--blue);background:var(--blue-dim)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;background:var(--bg3);padding:4px;border-radius:var(--radius-sm);border:1px solid var(--border)}
.tabx{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500;color:var(--text2);transition:all .15s;border:none;background:none;font-family:var(--font)}
.tabx.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.ttest{width:100%;border-collapse:collapse;font-size:13px}
.ttest th{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);font-weight:700;padding:6px 10px;text-align:left;border-bottom:1px solid var(--border)}
.ttest td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text)}
.ttest tr:last-child td{border-bottom:none}
.ttest tr:hover td{background:var(--bg3)}
.info-box{font-size:12px;color:var(--text2);padding:.75rem 1rem;background:var(--bg3);border-radius:var(--radius-sm);border-left:3px solid var(--blue);line-height:1.6}
.page-title{font-size:22px;font-weight:700;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text2)}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{opacity:1}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.back-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:13px;font-family:var(--font);padding:0;display:flex;align-items:center;gap:6px;margin-bottom:1.25rem}
.back-btn:hover{color:var(--text)}
/* Login screen */
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%, rgba(79,124,255,.15) 0%, transparent 70%), var(--bg)}
</style>
</head>
